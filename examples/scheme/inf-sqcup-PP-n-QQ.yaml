type: scheme
name: $\sqcup_{n = 1}^{\infty} \PP^n_\QQ$
description: The scheme $\sqcup_{n = 1}^{\infty} \PP^n_\QQ$.
adjectives:
  connected: [false, The disjoint union of (non-empty) schemes is not connected.]
  locally-noetherian: [true, Every $\PP^n_\QQ$ is locally Noetherian.]
  quasi-compact: [false, "The natural open cover $\\{ \\PP^n_\\QQ \\}_{n \\ge 1}$ does not have a finite subcover."]
  finite-dimensional: [false, "For each $n \\ge 1$, $\\PP^n_\\QQ$ is a closed integral subscheme of dimension $n$, so the Krull dimension is at least $n$ for all $n$."]
