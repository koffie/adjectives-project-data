type: morphism
name: $\Spec \QQ(x) \to \Spec \QQ$
description: The natural morphism induced by the inclusion $\QQ \hookrightarrow \QQ(x)$.
with:
  source: Spec-QQ-x-frac
  target: Spec-QQ
adjectives:
  surjective: [true, The target consists of a single point and the source is non-empty.]
  injective: [true, The source consists of a single point.]
  open: [true, Any subset of $\Spec \QQ$ is open.]
  closed: [true, Any subset of $\Spec \QQ$ is closed.]
  flat: [true, "$\\QQ(x)$ is flat over $\\QQ$ since every module over a field is free."]
  locally-of-finite-type: [false, "$\\QQ(x)$ is not a finitely generated $\\QQ$-algebra."]
  integral: [false, "$x \\in \\QQ(x)$ is transcendental over $\\QQ$, so $\\QQ(x)$ is not integral over $\\QQ$."]
